version: "3.9"

services:
  bot-deploy-api:
    build: .
    container_name: bot-deploy-api
    restart: unless-stopped
    ports:
      - "8097:8097"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8097
      # BASE_PATH is empty when nginx proxies at root (api.yourdomain.com → /)
      # Set BASE_PATH=/heroku-deploy if running behind a sub-path proxy
      - BASE_PATH=
    volumes:
      # Persist admin settings (herokuApiKey, apiSecretKey) across restarts
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8097/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
