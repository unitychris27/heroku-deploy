version: "3.9"

services:
  api:
    build: .
    container_name: heroku-deploy-api
    restart: unless-stopped
    ports:
      - "8097:8097"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8097
    volumes:
      # Persist settings & logs outside the container
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8097/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
