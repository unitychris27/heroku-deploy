# nginx reverse proxy config for api.yourdomain.com
# Place in /etc/nginx/sites-available/api.yourdomain.com
# then: ln -s /etc/nginx/sites-available/api.yourdomain.com /etc/nginx/sites-enabled/
# then: certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;

    # ACME challenge for SSL (Let's Encrypt / Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP → HTTPS after cert is issued
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Proxy to Docker container / PM2 process on port 8097
    location / {
        proxy_pass         http://127.0.0.1:8097;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # CORS (in case nginx handles preflight before Node.js)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key, Authorization";
            return 204;
        }
    }
}
